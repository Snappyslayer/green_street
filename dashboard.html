<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Street Digital Twin</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text: #f8fafc;
            --accent: #38bdf8;
            --online: #10b981;
            --offline: #ef4444;
        }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 2rem; 
            margin: 0; 
            background-image: radial-gradient(circle at top right, #1e293b 0%, transparent 40%);
        }
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 1rem; 
            margin-bottom: 2rem; 
        }
        h1 { margin: 0; font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
        
        .api-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .pulse { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .pulse.active { background: var(--online); box-shadow: 0 0 10px var(--online); animation: blink 1.5s infinite alternate; }
        .pulse.dead { background: var(--offline); box-shadow: 0 0 10px var(--offline); }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.4; } }
        
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 1.5rem; 
        }
        .node-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 16px; 
            padding: 1.5rem; 
            transition: all 0.3s ease;
        }
        .node-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border-color: rgba(56, 189, 248, 0.3);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-header h3 { margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.5px; }
        .badge.online { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge.offline { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .brightness-display { display: flex; align-items: baseline; gap: 10px; margin: 1.5rem 0; }
        .brightness-val { font-size: 2.8rem; font-weight: 800; color: var(--accent); }
        .brightness-label { color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        
        .footer-info { 
            display: flex; justify-content: space-between; 
            color: #64748b; font-size: 0.8rem; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            padding-top: 1rem; margin-top: 1rem; 
        }
        .empty-state { text-align: center; padding: 4rem; color: #64748b; grid-column: 1 / -1; font-size: 1.1rem; }
    </style>
</head>
<body>
    <header>
        <h1>🌍 Green Street Twin</h1>
        <div class="api-status">
            <span id="api-indicator" class="pulse dead"></span>
            <span id="api-text">API Disconnected</span>
        </div>
    </header>

    <div id="grid" class="grid-container">
        <div class="empty-state">Waiting for telemetry from MQTT Broker...</div>
    </div>

    <script>
        const formatTime = (timestamp) => {
            if (!timestamp) return 'Never';
            return new Date(timestamp * 1000).toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
        };

        const updateApiStatus = (connected) => {
            const indicator = document.getElementById('api-indicator');
            const text = document.getElementById('api-text');
            if (connected) {
                indicator.className = 'pulse active';
                text.innerText = 'API Connected';
                text.style.color = '#34d399';
            } else {
                indicator.className = 'pulse dead';
                text.innerText = 'API Offline';
                text.style.color = '#f87171';
            }
        };

        async function fetchGrid() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/grid');
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                updateApiStatus(true);
                
                const gridDiv = document.getElementById('grid');
                if (Object.keys(data.nodes).length === 0) {
                    gridDiv.innerHTML = '<div class="empty-state">No nodes active. Waiting for telemetry...</div>';
                    return;
                }

                gridDiv.innerHTML = ''; 

                for (const [nodeId, state] of Object.entries(data.nodes)) {
                    const isOnline = state.status === 'ONLINE';
                    const statusClass = isOnline ? 'online' : 'offline';
                    const statusIcon = isOnline ? '🟢' : '🔴';
                    const brightness = state.brightness.replace('_', ' ').replace(/[0-9]+/, ''); 
                    const brightnessValue = state.brightness.match(/\d+/) ? state.brightness.match(/\d+/)[0] + '%' : 'N/A';

                    const card = `
                        <div class="node-card">
                            <div class="card-header">
                                <h3>🔌 ${nodeId}</h3>
                                <span class="badge ${statusClass}">${statusIcon} ${state.status}</span>
                            </div>
                            <div class="brightness-display">
                                <span class="brightness-val">${brightnessValue}</span>
                                <span class="brightness-label">${brightness}</span>
                            </div>
                            <div class="footer-info">
                                <span>Signal: MQTT TCP</span>
                                <span>Last Seen: ${formatTime(state.last_seen)}</span>
                            </div>
                        </div>
                    `;
                    gridDiv.innerHTML += card;
                }
            } catch (error) {
                console.error("API Fetch Error:", error);
                updateApiStatus(false);
            }
        }
        
        setInterval(fetchGrid, 1000);
        fetchGrid();
    </script>
</body>
</html>
