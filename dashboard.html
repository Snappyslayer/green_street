<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Street Digital Twin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .grid-container { display: flex; gap: 20px; margin-top: 20px; }
        .node-card { background: #1e293b; border-radius: 10px; padding: 20px; width: 300px; border: 1px solid #334155; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .online { background: #10b981; color: #022c22; }
        .offline { background: #ef4444; color: #450a0a; }
        .brightness { font-size: 24px; font-weight: bold; color: #38bdf8; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🌍 Green Street: Live Digital Twin</h1>
    <p>Real-time visualization of the IoT lighting grid.</p>
    <div id="grid" class="grid-container">Loading grid state...</div>

    <script>
        async function fetchGrid() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/grid');
                const data = await response.json();
                const gridDiv = document.getElementById('grid');
                gridDiv.innerHTML = ''; // Clear old data

                for (const [nodeId, state] of Object.entries(data.nodes)) {
                    const statusClass = state.status === 'ONLINE' ? 'online' : 'offline';
                    const card = `
                        <div class="node-card">
                            <h3>🔌 ${nodeId}</h3>
                            <span class="status-badge ${statusClass}">${state.status}</span>
                            <div class="brightness">💡 ${state.brightness}</div>
                            <p style="color: #94a3b8; font-size: 12px; margin-top:15px;">Last Seen: ${new Date(state.last_seen * 1000).toLocaleTimeString()}</p>
                        </div>
                    `;
                    gridDiv.innerHTML += card;
                }
            } catch (error) {
                console.error("Error fetching Digital Twin API:", error);
            }
        }
        // Poll the API every 1 second
        setInterval(fetchGrid, 1000);
        fetchGrid();
    </script>
</body>
</html>
